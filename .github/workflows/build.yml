name: Build iOS App

on:
  push:
    branches: ["*"]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "Cider Remote.xcodeproj" \
            -scheme "Cider Remote"

      - name: Build
        run: |
          xcodebuild build \
            -project "Cider Remote.xcodeproj" \
            -scheme "Cider Remote" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 -type d | head -1)
          echo "Found app: $APP_PATH"

          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/Payload/

          cd $RUNNER_TEMP
          zip -r CiderRemote.ipa Payload -x "*.DS_Store"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CiderRemote-${{ github.sha }}
          path: ${{ runner.temp }}/CiderRemote.ipa
          retention-days: 30
